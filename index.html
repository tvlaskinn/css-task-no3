<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Css task no.3 </title>

  <link rel="stylesheet" href="style.css">
  <link rel="font" href=" https://www.fontsquirrel.com/fonts/barlow ">


</head>

<body>

  <div class="container">

    <div class="left">
      <img class="background" src="/img/bg.jpg" alt="bg.jpg">
      <img class="logo" src="/img/logo.svg" alt="logo">
    </div>


    <div class="right">
      <h2 class="title">Get iintoo it today</h2>
      <p class="paragraph">
        There is no charge or obligation upon registration</p>

      <div class="buttons-container">

        <button type="button" class="fb">
          <img class="facebook" src="/img/facebook.svg" alt="Facebook">
          Register with Facebook
        </button>

        <button type="button" class="in">
          <img class="linkedin" src="/img/linkedin.svg" alt="Linkedin">
          Register with Linkedin
        </button>
      </div>

      <div class="line-with-text">
        <span> OR </span>
      </div>


      <form action="" method="get">

        <div class="input-container">
          <div class="input-box">
            <div>
              <label>Email</label>
              <input type="email" id="email" name="email" value="gus.goodwin@gmail.com">
            </div>
          </div>

          <div class="input-box">
            <div>
              <label>Phone </label>
              <input type="phone" id="phone" name="phone">
            </div>
          </div>
        </div>

        <h2 class="title2">What type of investor are you ?</h2>
        <p class="paragraph2">Select the type of investor you are below.</p>



        <label class="radio">

          <label for="individual">
            <input type="radio" id="individual" name="option" value="individual">Individual
            <span class="i" data-tooltip="
            I am a natural person investing on my
            own behalf as a sole owner,joint tenant,
            or tenant in common."> ⓘ </span>
          </label>

          <label for="business">
            <input type="radio" id="business" name="option" value="business">Bussiness
            <span class="i" data-tooltip="
            I am a natural person investing on my
            own behalf as a sole owner,joint tenant,
            or tenant in common."> ⓘ </span>
          </label>

          <label for="ira">
            <input type="radio" id="ira" name="option" value="ira"> IRA
            <span class="i" data-tooltip="
            I am a natural person investing on my
            own behalf as a sole owner,joint tenant,
            or tenant in common."> ⓘ </span>
          </label>

          <label for="trust">
            <input type="radio" id="trust" name="option" value="trust"> Trust
            <span class="i" data-tooltip="
            I am a natural person investing on my
            own behalf as a sole owner,joint tenant,
            or tenant in common."> ⓘ </span>
          </label>
        </label>

        <label class="checkbox">
          <input type="checkbox">
          I agree to the terms and notifications from iintoo
          <a href="#" class="link">View full terms</a>
        </label>

        <button type="button" class="create">Create Account</button>
      </form>
    </div>

  </div>
</body>

</html>
