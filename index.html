<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Css task no.3 </title>

  <link rel="stylesheet" href="style.css">
  <link rel="font" href=" https://www.fontsquirrel.com/fonts/barlow ">


</head>

<body>

  <div class="container">

    <div class="left">
      <img class="background" src="bg.jpg" alt="bg.jpg">
      <img class="logo" src="logo.svg" alt="logo">
    </div>


    <div class="right">
      <h2 class="title">Get iintoo it today</h2>
      <p class="paragraph">
        There is no charge or obligation upon registration</p>

      <div class="buttons-container">

        <button type="button" class="fb">
          <img class="facebook" src="facebook.svg" alt="Facebook">
           Register with Facebook 
        </button>

        <button type="button" class="in">
          <img class="linkedin" src="linkedin.svg" alt="Linkedin"> 
            Register with Linkedin
        </button>  

      </div>

       <div class="or">
           OR 
       </div>

      <form action="" method="get">

      <div class="inputs">

        <input type="email" placeholder="Enter your e-mail">
        <input type="phone" placeholder="Enter your phone number">
      </div>

      <h2 class="title2">What type of investor are you ?</h2>
      <p class="paragraph2">Select the type of investor you are below.</p>


        <label class="radio">

          <input type="radio" name="option Individual">Individual
          <input type="radio" name="option Business" value="Business">Bussiness
          <input type="radio" name="option IRA" > IRA
          <input type="radio" name="option Trust"> Trust

        </label>

       <input type="checkbox" class="subtitle"> 
       <span>I agree to the terms and notifications from iintoo</span>
        <a href="View full terms" target="_blank">
          View full terms</a>

      </form>

      <button type="button" class="create">Create Account</button>

    </div>
  </div>
</body>
</html>
